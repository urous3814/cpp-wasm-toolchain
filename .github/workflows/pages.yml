name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:

  # ── Job 1: demo-build ───────────────────────────────────────────────────────
  # Compiles the demo TypeScript entry point, copies static assets, and
  # uploads the result as a GitHub Pages artifact.

  demo-build:
    name: demo-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download and extract toolchain into Pages site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Server-side download avoids browser CORS restrictions on GitHub Releases.
          # Extract the full tarball so the original manifest paths are preserved.
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          VERSION="${TAG#v}"
          echo "[pages] downloading cpp-wasm-toolchain-${VERSION}.tar.gz from release $TAG"
          gh release download "$TAG" \
            --pattern "cpp-wasm-toolchain-${VERSION}.tar.gz" \
            --clobber
          mkdir -p demo/dist/toolchain
          tar xzf "cpp-wasm-toolchain-${VERSION}.tar.gz" \
            -C demo/dist/toolchain \
            --strip-components=1
          echo "[pages] extracted toolchain:"
          ls demo/dist/toolchain/

      - name: Build demo site
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TOOLCHAIN_BASE_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/toolchain"
          echo "[pages] TOOLCHAIN_BASE_URL=$TOOLCHAIN_BASE_URL"
          pnpm demo:build
          # esbuild does not resolve import.meta.env; replace fallback URL in the bundle
          python3 -c "import os,pathlib; f=pathlib.Path('demo/dist/main.js'); old='/dist/cpp-wasm-toolchain/0.1.0'; new='${TOOLCHAIN_BASE_URL}'; t=f.read_text(); f.write_text(t.replace(old,new)); print('[demo] injected: '+new)"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  # ── Job 2: deploy ───────────────────────────────────────────────────────────

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: demo-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
