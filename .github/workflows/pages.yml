name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:

  # ── Job 1: demo-build ───────────────────────────────────────────────────────
  # Compiles the demo TypeScript entry point, copies static assets, and
  # uploads the result as a GitHub Pages artifact.

  demo-build:
    name: demo-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build demo site
        env:
          TOOLCHAIN_BASE_URL: ${{ vars.TOOLCHAIN_BASE_URL }}
        run: |
          pnpm demo:build
          # esbuild does not resolve import.meta.env; replace fallback URL in the bundle
          if [ -n "$TOOLCHAIN_BASE_URL" ]; then
            python3 -c "
import os, pathlib
f = pathlib.Path('demo/dist/main.js')
old = '/dist/cpp-wasm-toolchain/0.1.0'
new = os.environ['TOOLCHAIN_BASE_URL']
content = f.read_text()
if old in content:
    f.write_text(content.replace(old, new))
    print('[demo] TOOLCHAIN_BASE_URL injected: ' + new)
else:
    print('[demo] WARNING: fallback URL not found in bundle')
"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  # ── Job 2: deploy ───────────────────────────────────────────────────────────

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: demo-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
