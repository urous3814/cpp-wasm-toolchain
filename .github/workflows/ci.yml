name: CI

on:
  pull_request:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build nodejs

      - name: Validate script syntax
        run: |
          for f in toolchain/scripts/*.sh; do
            bash -n "$f" && echo "OK $f"
          done

      - name: Smoke test
        run: ./toolchain/scripts/smoke-test.sh
