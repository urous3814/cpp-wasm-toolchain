name: Feature Request
description: Suggest a new feature or improvement to the toolchain
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the roadmap (`docs/roadmap.md`) to see if this is already planned.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this be implemented? Include script names, API shapes, or artifact changes if relevant.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the toolchain does this affect?
      options:
        - sysroot (wasi-sdk headers / libraries)
        - compiler (clang.wasm build)
        - linker (wasm-ld.wasm build)
        - runtime (wasi-shim.ts)
        - loader (packages/loader)
        - worker (packages/worker)
        - packaging (package-toolchain.sh / manifest)
        - demo (demo site)
        - ci (GitHub Actions)
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you rule them out?
