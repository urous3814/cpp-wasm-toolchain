name: Bug Report
description: Report a bug in the toolchain build, packaging, or runtime
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out all required sections to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Toolchain version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser (if applicable), Node.js version, relevant tool versions
      placeholder: |
        OS: macOS 14 / Ubuntu 22.04
        Node: 20.x
        Browser: Chrome 125 (if runtime issue)
        emcc: 3.1.64 (if build issue)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ./toolchain/scripts/build-sysroot.sh
        2. Run ./toolchain/scripts/smoke-test.sh
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant terminal output or browser console errors.
      render: shell
