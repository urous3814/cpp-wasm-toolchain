<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cpp-wasm-toolchain demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>cpp-wasm-toolchain demo</h1>

    <div class="editor">
        <label for="code">C++ Source</label>
        <textarea id="code" rows="16" spellcheck="false">
#include &lt;iostream&gt;
#include &lt;vector&gt;
#include &lt;algorithm&gt;

int main() {
    std::vector&lt;int&gt; v = {5, 3, 1, 4, 2};
    std::sort(v.begin(), v.end());
    for (int x : v) std::cout &lt;&lt; x &lt;&lt; " ";
    std::cout &lt;&lt; std::endl;
    return 0;
}
        </textarea>
    </div>

    <div class="controls">
        <button id="run">Run</button>
        <span id="status"></span>
    </div>

    <div class="output">
        <label>Output</label>
        <pre id="output"></pre>
    </div>

    <script type="module" src="main.ts"></script>
</body>
</html>
