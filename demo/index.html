<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cpp-wasm-toolchain demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>cpp-wasm-toolchain demo</h1>
        <span id="version" class="version"></span>
    </header>

    <section class="toolchain-status">
        <div id="toolchain-info" class="info-bar">Loading toolchain…</div>
        <div id="worker-info" class="info-bar">Worker: initializing…</div>
    </section>

    <section class="examples">
        <span class="label">Examples</span>
        <button data-example="hello.cpp">hello.cpp</button>
        <button data-example="vector_sort.cpp">vector_sort.cpp</button>
    </section>

    <section class="editor">
        <label for="code">C++ Source</label>
        <textarea id="code" rows="16" spellcheck="false"></textarea>
    </section>

    <section class="controls">
        <button id="run">Run</button>
        <span id="status"></span>
    </section>

    <section class="output-section">
        <div class="output-col">
            <label>stdout</label>
            <pre id="stdout"></pre>
        </div>
        <div class="output-col">
            <label>stderr</label>
            <pre id="stderr"></pre>
        </div>
    </section>

    <script type="module" src="main.js"></script>
</body>
</html>
